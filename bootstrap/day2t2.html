<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<style>
    .logo {
        font-size: 32px;
        display: flex;
        align-items: center;
    }

    .col {
        display: flex;
        align-items: center;
    }

    .container-fluid {
        align-content: center;
        background-color: #68f86f;
        height: 60px;
        padding: 0px 30px;
    }

    .menu-icon {
        display: none;
    }

    .nn {
        display: none;
    }

    .nav-min {
        height: 300px;
        width: 800px;
        top: 60px;
        right: 44px;
        background-color: #d1c4c4;
        position: absolute;
        flex-direction: column;
        justify-content: space-around;
    }


    .nav-min ul {
        list-style-type: none;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
        gap: 15px;
    }


    @media (max-width:768px) {
        .col {
            display: none;
        }

        .menu-icon {
            display: flex;
            width: 20px;
            align-self: flex-end;
        }

        .nn {
            display: flex;
        }

        #nav {
            display: none;
        }

    }
</style>

<body>
    <section class="container-fluid">
        <div class="row">
            <div class="col-5 logo">Sa<i class="fa-solid fa-spoon"></i>das</div>
            <div class="col">Home</div>
            <div class="col">About</div>
            <div class="col">Menu</div>
            <div class="col">Pages</div>
            <div class="col">Blog</div>
            <div class="col">Contact</div>
            <div class="col">
                <i class="fa-solid fa-magnifying-glass"></i>&nbsp;&nbsp;&nbsp;&nbsp;<i class="fa-solid fa-moon"></i>
            </div>
            <div class="col-1 nn"></div>
            <div class="col-1 nn"></div>
            <div class="col-1 nn"></div>
            <div class="col-1 nn"></div>
            <div class="col-1 nn"></div>
            <div class="col-1 nn"></div>
            <div class="col menu-icon" id="btn" onclick="mode()"><i class="fa-solid fa-bars fa-2x"></i></div>
        </div>
    </section>
    <section>

        <section class="nav-min" id="nav">
            <ul>
                <li class="list-items">Home</li>
                <li class="list-items">About</li>
                <li class="list-items">Menu</li>
                <li class="list-items">Pages</li>
                <li class="list-items">Blog</li>
                <li class="list-items">Contact</li>
                <li class="list-items"><i class="fa-solid fa-magnifying-glass"></i></li>
            </ul>
            <!-- <div class="col">Home</div>
            <div class="">About</div>
            <div class="">Menu</div>
            <div class="">Pages</div>
            <div class="">Blog</div>
            <div class="">Contact</div>
            <div class=""><i class="fa-solid fa-magnifying-glass"></i></div> -->
        </section>
    </section>
    <script>
        function mode() {
            let nav = document.getElementById("nav")

            if (nav.style.display == "none") {
                nav.style.display = "block"
                nav.classList.add("drop")
            }
            else {
                nav.classList.remove("drop")
                nav.style.display = "none"
            }
        }

    </script>
</body>

</html>
