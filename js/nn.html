<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .lightmode {
        background-color: white;
        color: black;
    }

    .darkmode {
        background-color: black;

        color: white;
    }
</style>

<body class="lightmode">
    <p>this is light mode</p>
    <p class="two">lightmode</p>
    <button onclick="mode() ">Enable Dark Mode</button>
    <script>
        function mode() {
            let para = document.getElementsByTagName("p")[0]
            let btn = document.getElementsByTagName("button")[0]
            let body = document.body
            let p2 = document.getElementsByClassName("two")[0]

            if (body.className == "lightmode") {
                body.classList.add("darkmode")
                btn.innerHTML = "lightmode"
                para.innerHTML = "this is darkmode"
                p2.innerHTML = "darkmode"
                document.getElementsByClassName("two")[0].style.fontSize = "22px"
                document.getElementsByClassName("two")[0].style.color = "yellow"

            }
            else {
                body.classList.remove("darkmode")
                btn.innerHTML = "darkmode"
                para.innerHTML = "this is lightmode"
                p2.innerHTML = "lightmode"
                document.getElementsByClassName("two")[0].style.fontSize = "16px"
                document.getElementsByClassName("two")[0].style.color = "black"

            }
        }

    </script>
</body>

</html>
