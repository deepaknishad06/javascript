<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>
<style>

</style>

<body>
    <button onclick="html()">HTML</button>
    <p id="html"></p>

    <button onclick="css()">CSS</button>
    <p id="css"></p>

    <button onclick="java()">JAVASCRIPT</button>
    <p id="java"></p>
    <script>
        function html() {
            document.getElementById("html").innerHTML =
                "HTML (HyperText Markup Language) is the standard language used to create and structure the content of web pages. It is not a programming language but a markup language, meaning it uses a system of tags to annotate text and tell web browsers how to display it.";
            document.getElementById("css").style.display = "none";
            document.getElementById("java").style.display = "none";
            document.getElementById("html").style.display = "block";
        }
        function css() {
            document.getElementById("css").style.display = "block";
            document.getElementById("css").innerHTML =
                "In the context of technology and web development, CSS stands for Cascading Style Sheets. It is the standard language used to define the visual presentation, layout, and design of documents written in a markup language like HTML. ";

            document.getElementById("html").style.display = "none";
            document.getElementById("java").style.display = "none";
        }
        function java() {
            document.getElementById("java").innerHTML =
                "JavaScript is a versatile programming language used to build everything from interactive web elements to complex server-side infrastructure. While it is best known as the language of the web, its role has expanded significantly across several domains: ";

            document.getElementById("java").style.display = "block";
            document.getElementById("html").style.display = "none";
            document.getElementById("css").style.display = "none";
        }
    </script>

</body>

</html>
